<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage - Blog</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
  <script>(function(){var v=localStorage.getItem('theme_vars');if(v)try{var s=JSON.parse(v),r=document.documentElement;for(var k in s)r.style.setProperty(k,s[k])}catch(e){}})();</script>
  <script>(function(){var c=localStorage.getItem('site_config');if(c)try{var s=JSON.parse(c),r=document.documentElement;if(s.font)r.style.setProperty('--font-sans',s.font);if(s.fontSize)r.style.fontSize=s.fontSize+'px';if(s.lang)window._lang=s.lang}catch(e){}})();</script>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1><a href="/index.html">~/blog</a></h1>
    </header>

    <section id="token-section" class="editor-card" style="display:none;">
      <h2 data-i18n="auth.github">连接 GitHub</h2>
      <p class="hint" data-i18n="auth.github.hint">输入 Fine-grained Personal Access Token，需要 Contents: Read and write 权限。</p>
      <div class="form-row">
        <input type="password" id="token" data-i18n-ph="auth.github.placeholder" placeholder="github_pat_..." class="input-full">
        <button id="save-token" class="btn" data-i18n="btn.verify">验证</button>
      </div>
      <div id="token-status" class="status-msg"></div>
    </section>

    <section id="manage-section" class="editor-card" style="display:none;">
      <div class="editor-header">
        <h2 data-i18n="manage.title">文章管理</h2>
        <div class="editor-meta">
          <span><span data-i18n="manage.loginAs">登录为</span> <strong id="user-display"></strong></span>
          <a href="/editor/write.html" class="btn" data-i18n="btn.write">写文章</a>
          <button id="refresh-posts" class="btn" data-i18n="btn.refresh">刷新</button>
          <button id="settings-btn" class="btn-icon" title="站点设置">&#9881;</button>
          <button id="logout-btn" class="btn-link" data-i18n="btn.switchAccount">切换账号</button>
        </div>
      </div>
      <div id="local-drafts-section" style="display:none;">
        <h3 class="local-drafts-title" data-i18n="manage.localDrafts">本地草稿</h3>
        <div id="local-drafts-list" class="local-drafts-list"></div>
      </div>
      <div id="post-list-status" class="status-msg"></div>
      <div id="batch-bar" class="batch-bar" style="display:none;">
        <label class="batch-select-all"><input type="checkbox" id="select-all-cb"> <span data-i18n="btn.selectAll">全选</span></label>
        <span class="batch-count"></span>
        <button class="btn btn-batch-draft" data-i18n="btn.batchDraft">批量草稿</button>
        <button class="btn btn-batch-publish" data-i18n="btn.batchPublish">批量发布</button>
        <button class="btn btn-batch-delete" data-i18n="btn.batchDelete">批量删除</button>
      </div>
      <div id="post-list" class="post-list-manage"></div>
      <div class="pagination" id="pagination-controls" style="display:none;">
        <button id="page-prev" class="btn" data-i18n="page.prev">← 上一页</button>
        <span id="page-info" class="page-info"></span>
        <button id="page-next" class="btn" data-i18n="page.next">下一页 →</button>
      </div>
    </section>

    <div id="settings-modal" class="modal" style="display:none;">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 data-i18n="settings.title">站点设置</h3>
          <button id="settings-close" class="btn-icon">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label data-i18n="settings.siteTitle">站点标题</label>
            <input type="text" id="cfg-title" class="input-full" placeholder="~/blog">
          </div>
          <div class="form-group">
            <label data-i18n="settings.tagline">标语</label>
            <input type="text" id="cfg-tagline" class="input-full" placeholder="thoughts, code, stories">
          </div>
          <div class="form-group">
            <label data-i18n="settings.footer">页脚文本</label>
            <input type="text" id="cfg-footer" class="input-full" placeholder="built with html & persistence">
          </div>
          <div class="form-row">
            <div class="form-group flex-1">
              <label data-i18n="settings.font">字体</label>
              <select id="cfg-font" class="input-full">
                <option value="system-ui" data-i18n="font.systemUi">System UI（系统默认）</option>
                <option value="serif" data-i18n="font.serif">Serif（衬线体）</option>
                <option value="monospace" data-i18n="font.monospace">Monospace（等宽体）</option>
                <option value="'Georgia', serif">Georgia</option>
                <option value="'Palatino', serif">Palatino</option>
              </select>
            </div>
            <div class="form-group">
              <label data-i18n="settings.fontSize">基础字号</label>
              <select id="cfg-fontsize" class="input-full">
                <option value="14">14px</option>
                <option value="15">15px</option>
                <option value="16">16px</option>
                <option value="17">17px</option>
                <option value="18">18px</option>
                <option value="20">20px</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="cfg-show-rss" checked>
              <span data-i18n="settings.showRss">显示 RSS 订阅链接</span>
            </label>
          </div>
          <div class="form-group">
            <label data-i18n="settings.language">语言</label>
            <select id="cfg-lang" class="input-full">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
          <div id="settings-status" class="status-msg"></div>
        </div>
        <div class="modal-footer">
          <button id="settings-save" class="btn" data-i18n="btn.save">保存</button>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <p>built with html &amp; persistence</p>
    </footer>
  </div>

  <script src="/editor/js/github.js"></script>
  <script src="/editor/js/local.js"></script>
  <script>
    (function() {
      var mode = localStorage.getItem('storage_mode');
      if (mode === 'local') { window.storage = LOCAL; return; }
      if (mode === 'github') { window.storage = GH; return; }
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/api/user', false);
      try {
        xhr.send();
        if (xhr.status === 200) { window.storage = LOCAL; localStorage.setItem('storage_mode', 'local'); }
        else { window.storage = GH; localStorage.setItem('storage_mode', 'github'); }
      } catch(e) { window.storage = GH; localStorage.setItem('storage_mode', 'github'); }
    })();
  </script>
  <script src="/js/i18n.js"></script>
  <script src="/editor/js/manage.js"></script>
  <script src="/js/theme.js"></script>
  <script>(function(){fetch('/config.json').then(function(r){return r.json()}).then(function(s){localStorage.setItem('site_config',JSON.stringify(s));var t=document.querySelector('.site-header h1 a');if(t&&s.title)t.textContent=s.title;if(s.lang)window._lang=s.lang;applyI18n()}).catch(function(){})})();</script>
</body>
</html>
