<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write - Blog</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script>(function(){var v=localStorage.getItem('theme_vars');if(v)try{var s=JSON.parse(v),r=document.documentElement;for(var k in s)r.style.setProperty(k,s[k])}catch(e){}})();</script>
  <script>(function(){var c=localStorage.getItem('site_config');if(c)try{var s=JSON.parse(c),r=document.documentElement;if(s.font)r.style.setProperty('--font-sans',s.font);if(s.fontSize)r.style.fontSize=s.fontSize+'px';if(s.lang)window._lang=s.lang}catch(e){}})();</script>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1><a href="/index.html">~/blog</a></h1>
    </header>

    <section id="token-section" class="editor-card" style="display:none;">
      <h2 data-i18n="auth.github">连接 GitHub</h2>
      <p class="hint" data-i18n="auth.github.hint">输入 Fine-grained Personal Access Token，需要 Contents: Read and write 权限。</p>
      <div class="form-row">
        <input type="password" id="token" data-i18n-ph="auth.github.placeholder" placeholder="github_pat_..." class="input-full">
        <button id="save-token" class="btn" data-i18n="btn.verify">验证</button>
      </div>
      <div id="token-status" class="status-msg"></div>
    </section>

    <section id="editor-section" class="editor-card" style="display:none;">
      <div class="editor-header">
        <h2 id="editor-title" data-i18n="editor.newPost">写文章</h2>
        <div class="editor-meta">
          <a href="/editor/index.html" class="btn" data-i18n="btn.manage">文章管理</a>
          <button id="logout-btn" class="btn-link" data-i18n="btn.switchAccount">切换账号</button>
        </div>
      </div>

      <div class="form-group">
        <label data-i18n="label.title">标题</label>
        <input type="text" id="title" data-i18n-ph="placeholder.title" placeholder="文章标题" class="input-full">
      </div>

      <div class="form-row">
        <div class="form-group flex-1">
          <label data-i18n="label.slug">Slug (URL 路径)</label>
          <input type="text" id="slug" data-i18n-ph="placeholder.slug" placeholder="自动生成" class="input-full">
        </div>
        <div class="form-group">
          <label data-i18n="label.date">日期</label>
          <input type="date" id="date" class="input-full">
        </div>
      </div>

      <div class="form-group">
        <label data-i18n="label.tags">标签（逗号分隔）</label>
        <input type="text" id="tags" data-i18n-ph="placeholder.tags" placeholder="标签1, 标签2, 标签3" class="input-full">
      </div>

      <div class="form-group">
        <label data-i18n="label.summary">摘要</label>
        <input type="text" id="summary" data-i18n-ph="placeholder.summary" placeholder="一句话描述" class="input-full">
      </div>

      <div class="form-group">
        <label data-i18n="label.content">正文（Markdown）</label>
        <div id="toolbar" class="toolbar"></div>
        <textarea id="content" rows="20" data-i18n-ph="placeholder.content" placeholder="在这里写 Markdown..." class="input-full" style="border-radius:0 0 8px 8px;"></textarea>
      </div>

      <div class="form-actions">
        <button id="publish-btn" class="btn" data-i18n="btn.publish">发布</button>
        <button id="draft-btn" class="btn" data-i18n="btn.draft">存为草稿</button>
        <button id="preview-btn" class="btn" data-i18n="btn.preview">预览</button>
        <button id="preview-refresh" class="btn" style="display:none;" data-i18n="btn.refreshPreview">刷新预览</button>
        <div id="publish-status" class="status-msg"></div>
      </div>

      <div id="preview" class="post-content" style="display:none;"></div>
    </section>

    <footer class="site-footer">
      <p>built with html &amp; persistence</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>if(typeof marked==='undefined')document.write('<script src="/js/vendor/marked.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script>if(typeof katex==='undefined')document.write('<script src="/js/vendor/katex.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script>if(typeof renderMathInElement==='undefined')document.write('<script src="/js/vendor/auto-render.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>if(typeof mermaid==='undefined')document.write('<script src="/js/vendor/mermaid.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script>if(typeof Prism==='undefined')document.write('<script src="/js/vendor/prism.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js"></script>
  <script>if(Prism&&!Prism.languages.c)document.write('<script src="/js/vendor/prism-c.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>
  <script>if(Prism&&!Prism.languages.cpp)document.write('<script src="/js/vendor/prism-cpp.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script>if(Prism&&!Prism.languages.bash)document.write('<script src="/js/vendor/prism-bash.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script>if(Prism&&!Prism.languages.python)document.write('<script src="/js/vendor/prism-python.min.js"><\/script>')</script>
  <script src="/editor/js/github.js"></script>
  <script src="/editor/js/local.js"></script>
  <script>
    (function() {
      var mode = localStorage.getItem('storage_mode');
      if (mode === 'local') { window.storage = LOCAL; return; }
      if (mode === 'github') { window.storage = GH; return; }
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/api/user', false);
      try {
        xhr.send();
        if (xhr.status === 200) { window.storage = LOCAL; localStorage.setItem('storage_mode', 'local'); }
        else { window.storage = GH; localStorage.setItem('storage_mode', 'github'); }
      } catch(e) { window.storage = GH; localStorage.setItem('storage_mode', 'github'); }
    })();
  </script>
  <script src="/js/i18n.js"></script>
  <script src="/editor/js/write.js"></script>
  <script src="/js/theme.js"></script>
  <script>(function(){fetch('/config.json').then(function(r){return r.json()}).then(function(s){localStorage.setItem('site_config',JSON.stringify(s));var t=document.querySelector('.site-header h1 a');if(t&&s.title)t.textContent=s.title;if(s.lang)window._lang=s.lang;applyI18n()}).catch(function(){})})();</script>
</body>
</html>
