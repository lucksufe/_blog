<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script>(function(){var v=localStorage.getItem('theme_vars');if(v)try{var s=JSON.parse(v),r=document.documentElement;for(var k in s)r.style.setProperty(k,s[k])}catch(e){}})();</script>
  <script>(function(){var c=localStorage.getItem('site_config');if(c)try{var s=JSON.parse(c),r=document.documentElement;if(s.font)r.style.setProperty('--font-sans',s.font);if(s.fontSize)r.style.fontSize=s.fontSize+'px';if(s.lang)window._lang=s.lang}catch(e){}})();</script>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1><a href="index.html">~/blog</a></h1>
    </header>

    <article id="post-article">
      <div class="post-header" id="post-header"></div>
      <div class="post-content" id="post-content"></div>
      <a href="index.html" class="back-link" data-i18n="post.back" style="display:block;margin-top:32px;"></a>
    </article>

    <div class="empty-state" id="not-found" style="display:none;">
      <p data-i18n="post.notFound">文章不存在</p>
    </div>

    <footer class="site-footer">
      <p><a href="rss.xml">RSS</a></p>
      <p>built with html &amp; persistence</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>if(typeof marked==='undefined')document.write('<script src="js/vendor/marked.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script>if(typeof katex==='undefined')document.write('<script src="js/vendor/katex.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script>if(typeof renderMathInElement==='undefined')document.write('<script src="js/vendor/auto-render.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>if(typeof mermaid==='undefined')document.write('<script src="js/vendor/mermaid.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script>if(typeof Prism==='undefined')document.write('<script src="js/vendor/prism.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js"></script>
  <script>if(Prism&&!Prism.languages.c)document.write('<script src="js/vendor/prism-c.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>
  <script>if(Prism&&!Prism.languages.cpp)document.write('<script src="js/vendor/prism-cpp.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script>if(Prism&&!Prism.languages.bash)document.write('<script src="js/vendor/prism-bash.min.js"><\/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script>if(Prism&&!Prism.languages.python)document.write('<script src="js/vendor/prism-python.min.js"><\/script>')</script>
  <script src="js/post.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script>(function(){fetch('/config.json').then(function(r){return r.json()}).then(function(s){localStorage.setItem('site_config',JSON.stringify(s));var t=document.querySelector('.site-header h1 a');if(t&&s.title!==undefined)t.textContent=s.title;var f=document.querySelector('.site-footer p:last-child');if(f&&s.footer!==undefined)f.textContent=s.footer;var r=document.querySelector('.site-footer p:first-child');if(r)r.style.display=s.showRss===false?'none':'';if(s.lang)window._lang=s.lang;applyI18n()}).catch(function(){applyI18n()})})();</script>
</body>
</html>
